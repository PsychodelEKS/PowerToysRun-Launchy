name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build .\Community.PowerToys.Run.Plugin.Launchy\Community.PowerToys.Run.Plugin.Launchy.csproj -c Release -p:Platform=${{ matrix.platform }}

      - name: Package
        shell: pwsh
        run: |
          $platform = "${{ matrix.platform }}"
          $assetPlatform = if ($platform -eq "ARM64") { "arm64" } else { "x64" }
          $tag = "${{ github.ref_name }}"
          $releasePath = ".\Community.PowerToys.Run.Plugin.Launchy\bin\$platform\Release\net10.0-windows"
          $packageRoot = ".\out\Launchy"
          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
          Copy-Item "$releasePath\Community.PowerToys.Run.Plugin.Launchy.dll" $packageRoot -Force
          Copy-Item "$releasePath\Community.PowerToys.Run.Plugin.Launchy.deps.json" $packageRoot -Force
          Copy-Item "$releasePath\Community.PowerToys.Run.Plugin.Launchy.runtimeconfig.json" $packageRoot -Force
          Copy-Item "$releasePath\plugin.json" $packageRoot -Force
          Copy-Item "$releasePath\Images" $packageRoot -Recurse -Force
          Compress-Archive -Path "$packageRoot\*" -DestinationPath ".\PowerToysRun-Launchy-$tag-$assetPlatform.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerToysRun-Launchy-${{ github.ref_name }}-${{ matrix.platform }}
          path: PowerToysRun-Launchy-${{ github.ref_name }}-*.zip

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
